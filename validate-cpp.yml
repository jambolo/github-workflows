name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy lcov ninja-build

    - name: Configure CMake
      run: cmake -B build -G Ninja -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage"

    - name: Lint (PRs only)
      if: github.event_name == 'pull_request'
      run: find . -path ./build -prune -o -type f \( -name "*.cpp" -o -name "*.h" \) -print | xargs clang-tidy -p build

    - name: Build
      run: cmake --build build --config Debug

    - name: Run tests and generate coverage
      shell: bash
      run: |
        cd build
        ctest --output-on-failure
        cd ..
        lcov --capture --directory ./build --output-file coverage.info --ignore-errors mismatch,gcov,negative,unused
        lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/test/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.info
        fail_ci_if_error: true
